name: KAuctionHouse
version: 1.0.0
main: me.klouse.kauctionhouse.KAuctionHouse
api-version: '1.21'
authors: [Klouse]
depend: [Vault]

commands:
  ah:
    description: Main auction command
    usage: /ah
    aliases: [auction]

permissions:
  klouse.auction.admin:
    description: Full admin access to KAuctionHouse
    default: op

  klouse.auction.reload:
    description: Reload KAuctionHouse configuration
    default: op

  klouse.auction.limit.default:
    description: Default auction listing limit
    default: true

  klouse.auction.limit.vip:
    description: VIP auction listing limit
    default: false
